version: "3.8"

services:
  backend:
    image: ghcr.io/nastronot/sticky-icky-backend:latest
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS}
    expose:
      - "8765"
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
    restart: unless-stopped

  frontend:
    image: ghcr.io/nastronot/sticky-icky-frontend:latest
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
