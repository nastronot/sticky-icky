server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 1M;

    # Security headers. Applied at server scope so they're inherited by both
    # location blocks (nginx only inherits add_header when the child block
    # defines none of its own).
    #
    # HSTS is intentionally NOT set here — HTTPS termination happens at the
    # Synology reverse proxy / Let's Encrypt layer, which is the correct
    # place to set Strict-Transport-Security. Setting it inside this
    # container would be misleading because nginx here only speaks HTTP to
    # the proxy.
    #
    # CSP: allow the app itself, Google Fonts (stylesheet origin +
    # gstatic.com for font files), data:/blob: images (used by the gallery
    # thumbnails, PNG export, and pasted/dragged images). script-src allows
    # 'self' (Vite-bundled JS in /assets/) plus the SHA-256 hash of the
    # inline theme-bootstrap script in index.html. style-src keeps
    # 'unsafe-inline' because React emits inline style="..." attributes at
    # runtime; we render no user-supplied HTML so this is an accepted
    # trade-off. frame-ancestors 'none' stops clickjacking.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-SdUk7FXyIJ4CI/KN7k6zdYo4oWFATFnaTcfnYv7+kw0='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

    location /api/ {
        proxy_pass http://backend:8765/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
