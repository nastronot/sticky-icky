<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Sticky Zebra app icon: yellow squircle with a centered red circle.
       Squircle corner radius is ~20% of the icon edge. The red circle's
       diameter equals the gap between its edge and the squircle's edge —
       so circle diameter and each side gap are both icon_size / 3 for a
       balanced 1:1:1 division across each axis. -->
  <rect width="512" height="512" rx="102" ry="102" fill="#FED00A"/>
  <circle cx="256" cy="256" r="85.333" fill="#D00B14"/>
</svg>
